# https://goframe.org/docs/web/server-config-file-template
server:
  address: ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  clientMaxBodySize: 52428800  # 50 MB，HTTP Body 硬限制，防止超大文件打爆内存

# https://goframe.org/docs/core/glog-config
logger:
  level: "all"
  stdout: true

ds_think_chat_model:
  api_key: "e0891aaf-3305-44ed-9b5b-56f800e171d3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "deepseek-v3-1-terminus"

ds_quick_chat_model:
  api_key: "e0891aaf-3305-44ed-9b5b-56f800e171d3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "deepseek-v3-1-terminus"

doubao_embedding_model:
  api_key: "sk-ccb4e6c8f65f478b9ac539f5361446ce"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"

file_dir: "d:/GoProject/Fo-Sentinel-Agent/docs"

semantic_cache:
  ttl_hours: 24
  threshold: 0.85        # 语义缓存命中阈值（余弦相似度）
  key_prefix: "rag:cache"
  topk: 3                # Milvus 每次召回文档数（默认 3）
  min_score: 0.30        # 召回结果最低相似度阈值，低于此值的块会被过滤