server:
  address: ":8001"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  clientMaxBodySize: 52428800  # 50 MB，防止超大文件上传打爆内存
  enable_frontend_hosting: false

logger:
  level: "all"
  stdout: true

# 熔断器配置：连续失败 failure_threshold 次触发熔断，open_duration_sec 秒后进入半开探测
model_breaker:
  failure_threshold: 2
  open_duration_sec: 30

# 主推理模型候选列表（按 priority 升序，主模型熔断后自动降级到下一个候选）
ds_think_chat_model:
  candidates:
    - id: "ark-deepseek-v3-think"
      api_key: ""
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      model: "deepseek-v3-1-terminus"
      priority: 1
    - id: "ark-deepseek-v3-think2"
      api_key: ""
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      model: "deepseek-v3-1-terminus"
      priority: 2

# 快速模型候选列表（意图识别路由 / Executor 步骤调度，低延迟优先）
ds_quick_chat_model:
  candidates:
    - id: "ark-deepseek-v3-quick"
      api_key: ""
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      model: "deepseek-v3-1-terminus"
      priority: 1
    - id: "ark-deepseek-v3-quick2"
      api_key: ""
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      model: "deepseek-v3-1-terminus"
      priority: 2

# 向量嵌入模型（DashScope text-embedding-v4，同时用于 Rerank）
doubao_embedding_model:
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"

# 内部文档知识库根目录（query_internal_docs 工具扫描此路径）
file_dir: "docs"

milvus:
  addr: "standalone:19530"

redis:
  addr: "redis:6379"
  password: ""
  db: 0

  # 对话历史缓存：多轮对话上下文持久化到 Redis，服务重启后可恢复
  chat_cache:
    ttl: 720
    key_prefix: "session"

  # 语义缓存：对 RAG 检索结果缓存，相似度命中时跳过 Embedding + Milvus 调用
  semantic_cache:
    ttl: 24
    threshold: 0.85
    key_prefix: "rag:cache"
    topk: 5
    final_topk: 3
    min_score: 0.30

# 检索增强（RAG）
retriever:
  rewrite_enabled: true
  split_enabled: true
  confidence_threshold: 0.70

  rerank:
    enabled: true
    api_key: ""
    model: "qwen3-rerank"
    base_url: "https://dashscope.aliyuncs.com/compatible-api/v1"
    instruct: "Given a web search query, retrieve relevant passages that answer the query."

  hybrid:
    enabled: true
    rrf_k: 60

database:
  mysql:
    dsn: "root:sentinel123@tcp(mysql:3306)/fo_sentinel?charset=utf8mb4&parseTime=True"

# 认证
auth:
  jwt:
    enabled: true
    secret: "change-me-in-production"
    expire_hours: 24
  seed:
    admin_password: "admin123"

# 后台调度器
scheduler:
  fetch_interval_minutes: 15
  index_interval_minutes: 20
  index_batch_size: 10

# 对话记忆管理
memory:
  summaryTrigger: 30
  summaryBatchSize: 10
  tokenTrigger: 3000
  minRecentMessages: 4

# 工具
tools:
  web_search:
    tavily_api_key: ""
    tavily_base_url: "https://api.tavily.com/search"
    tavily_search_depth: "advanced"
  github:
    token: ""

# 全链路追踪
trace:
  enabled: true
  max_error_length: 1000
  record_prompt: false
  record_sql: true
  db_slow_threshold_ms: 100
  model_pricing:
    deepseek-v3:
      input: 2.0
      output: 8.0
    text-embedding-v4:
      input: 0.5
      output: 0.0
    qwen3-rerank:
      input: 0.5
      output: 0.0

# 限流
limiter:
  rate_global_qps: 100
  rate_chat_qps: 2
  rate_event_qps: 5
  rate_knowledge_qps: 10
  rate_query_qps: 30
  rate_user_qps: 20
  agent_timeout_sec: 90
  agent_deep_timeout_sec: 300

knowledge:
  upload_dir: "manifest/upload/knowledge"
  index_workers: 3
  queue_capacity: 1000
  default_kb_name: "默认知识库"
  parent_chunk_size: 1024
  child_chunk_size: 256
  child_overlap_size: 40

# SOAR 集成配置
soar:
  integrations:
    dingtalk:
      webhook_url: ""
    wecom:
      webhook_url: ""
    email:
      smtp_host: ""
      smtp_port: ""
      smtp_user: ""
      smtp_pass: ""

  ai_ops:
    notify_channel: "email"
    notify_email_to: ""
    allow_block_ip: true
    block_ip_backend: "nginx"
    nginx_blocklist_path: "/app/nginx_blocklist/blocked_ips.conf"
    nginx_container: "nginx"
    allow_ai_analyze: true
