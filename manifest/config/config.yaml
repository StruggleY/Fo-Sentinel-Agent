# https://goframe.org/docs/web/server-config-file-template
server:
  address: ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  clientMaxBodySize: 52428800  # 50 MB，HTTP Body 硬限制，防止超大文件打爆内存

# https://goframe.org/docs/core/glog-config
logger:
  level: "all"
  stdout: true

ds_think_chat_model:
  api_key: "e0891aaf-3305-44ed-9b5b-56f800e171d3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "deepseek-v3-1-terminus"

ds_quick_chat_model:
  api_key: "e0891aaf-3305-44ed-9b5b-56f800e171d3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "deepseek-v3-1-terminus"

doubao_embedding_model:
  api_key: "sk-ccb4e6c8f65f478b9ac539f5361446ce"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"

file_dir: "d:/GoProject/Fo-Sentinel-Agent/docs"

# Redis 全局配置（供语义缓存、对话历史等模块复用）
redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  # 语义缓存配置（RAG 检索结果缓存，减少重复 Embedding+Milvus 调用）
  semantic_cache:
    ttl: 24                # 缓存有效期（小时）
    threshold: 0.85        # 余弦相似度命中阈值
    key_prefix: "rag:cache"
    topk: 3                # Milvus 每次召回文档数
    min_score: 0.30        # 召回结果最低相似度阈值
  # 对话历史缓存配置（多轮对话上下文持久化，服务重启后可恢复）
  chat_cache:
    ttl: 720               # 缓存有效期（小时），30 天 = 30*24
    key_prefix: "session"

# 对话记忆配置（分层记忆架构：短期记忆 + 长期摘要）
memory:
  summaryTrigger: 30  # 触发历史对话总结阈值
  summaryBatchSize: 10  # 每次总结的消息数量
