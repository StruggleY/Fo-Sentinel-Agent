# ── HTTP 服务器 ────────────────────────────────────────────────────────────────
server:
  address: ":8001"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  clientMaxBodySize: 52428800  # 50 MB，防止超大文件上传打爆内存

# ── 日志 ───────────────────────────────────────────────────────────────────────
logger:
  level: "all"
  stdout: true

# ── AI 模型 ────────────────────────────────────────────────────────────────────
# 主推理模型（深度思考 / 各专业 Agent ReAct 推理）
ds_think_chat_model:
  api_key: ""
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "deepseek-v3-1-terminus"

# 快速模型（意图识别路由 / Executor 步骤调度，低延迟优先）
ds_quick_chat_model:
  api_key: ""
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "deepseek-v3-1-terminus"

# 向量嵌入模型（DashScope text-embedding-v4，同时用于 Rerank）
doubao_embedding_model:
  api_key: ""
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"

# 内部文档知识库根目录（query_internal_docs 工具扫描此路径）
file_dir: "docs"

# ── Redis ──────────────────────────────────────────────────────────────────────
redis:
  addr: "localhost:16379"
  password: ""
  db: 0

  # 对话历史缓存：多轮对话上下文持久化到 Redis，服务重启后可恢复
  chat_cache:
    ttl: 720            # 缓存有效期（小时），720h = 30 天
    key_prefix: "session"

  # 语义缓存：对 RAG 检索结果缓存，相似度命中时跳过 Embedding + Milvus 调用
  semantic_cache:
    ttl: 24             # 缓存有效期（小时）
    threshold: 0.85     # 余弦相似度命中阈值，高于此值视为缓存命中
    key_prefix: "rag:cache"
    topk: 5             # Milvus 初始召回候选文档数（扩大候选池，提升召回率）
    final_topk: 3       # 返回给 LLM 的最终文档数（从候选池截取，topk >= final_topk）
    min_score: 0.30     # 向量检索结果最低相似度阈值，低于此值的文档丢弃

# ── 检索增强（RAG） ────────────────────────────────────────────────────────────
retriever:
  # 查询重写：消除多轮对话中的代词歧义、补全上下文，增加约 200ms 延迟
  rewrite_enabled: true
  # 子问题拆分：将复杂查询拆分为多个子查询并行检索，增加约 300ms 延迟
  split_enabled: true
  # 意图置信度阈值：低于此值时返回歧义引导提示，而非强制路由
  confidence_threshold: 0.70

  # Rerank 精排：对 Milvus 召回结果重新打分排序，提升检索精准度
  rerank:
    enabled: true
    api_key: ""
    model: "qwen3-rerank"
    base_url: "https://dashscope.aliyuncs.com/compatible-api/v1"
    instruct: "Given a web search query, retrieve relevant passages that answer the query."

  # 混合检索：Sparse-Dense 混合检索（BM25 + 语义向量，RRF 融合）
  hybrid:
    enabled: true         # 是否启用混合检索（events/documents 分区默认启用）
    rrf_k: 60             # RRF 融合参数 k（Reciprocal Rank Fusion）

# ── 数据库 ─────────────────────────────────────────────────────────────────────
database:
  mysql:
    dsn: "root:sentinel123@tcp(127.0.0.1:3307)/fo_sentinel?charset=utf8mb4&parseTime=True"

# ── 认证 ───────────────────────────────────────────────────────────────────────
auth:
  jwt:
    enabled: false                    # 生产环境建议设为 true
    secret: "change-me-in-production" # 生产环境务必替换为强随机字符串
    expire_hours: 24
  seed:
    admin_password: "admin123"        # 首次初始化的管理员密码，生产环境务必修改

# ── 后台调度器 ─────────────────────────────────────────────────────────────────
scheduler:
  fetch_interval_minutes: 15  # 订阅源抓取间隔（分钟）
  index_interval_minutes: 20  # 向量索引间隔（分钟）
  index_batch_size: 10        # 单批向量化文档数，受 DashScope Embedding API 上限约束（≤ 10）

# ── 对话记忆管理 ───────────────────────────────────────────────────────────────
memory:
  summaryTrigger: 30    # 消息数辅助触发阈值：超过此条数触发摘要压缩
  summaryBatchSize: 10  # 每次摘要压缩的消息条数
  tokenTrigger: 3000    # Token 主触发阈值：累计 Token 超出时触发摘要压缩
  minRecentMessages: 4  # 摘要后最少保留的近期消息数（保证对话连贯性）

# ── 工具 ───────────────────────────────────────────────────────────────────────
tools:
  web_search:
    # Tavily Search API，专为 AI Agent 设计，申请地址：https://tavily.com
    tavily_api_key: ""
    tavily_base_url: "https://api.tavily.com/search"
    tavily_search_depth: "advanced"   # basic（快速）| advanced（深度，结果更全）

# ── 全链路追踪 ─────────────────────────────────────────────────────────────────
trace:
  enabled: true
  max_error_length: 1000
  record_prompt: false        # 是否记录 Prompt/Completion 原文（开启将显著增加写入量）
  record_sql: true           # 是否记录 SQL 语句（开启将记录慢查询 SQL 原文）
  db_slow_threshold_ms: 100   # 慢查询阈值（毫秒），超过此值的查询才会被追踪
  # 模型单价（¥/1M tokens，直接填写人民币，无需汇率换算）
  # 键名与 TraceNode.model_name 字段值匹配（大小写不敏感前缀匹配）
  model_pricing:
    deepseek-v3:
      input: 2.0              # 火山引擎 Ark ¥2/1M input tokens
      output: 8.0             # 火山引擎 Ark ¥8/1M output tokens
    text-embedding-v4:
      input: 0.5              # DashScope text-embedding-v4 ¥0.5/1M tokens
      output: 0.0
    qwen3-rerank:
      input: 0.5              # ¥0.0005/千tokens = ¥0.5/1M tokens（最大500个文档/次，单文档上限4K tokens，请求上限120K tokens）
      output: 0.0

# ── 知识库 ─────────────────────────────────────────────────────────────────────
knowledge:
  upload_dir: "manifest/upload/knowledge"  # 上传文件本地保存根目录
  index_workers: 3                          # 索引 Worker Pool 并发数
  queue_capacity: 1000                      # 索引任务队列容量
  default_kb_name: "默认知识库"
  parent_chunk_size: 1024                   # 父块大小（rune 数，hierarchical 策略）
  child_chunk_size: 256                     # 子块大小（rune 数）
  child_overlap_size: 40                    # 子块重叠窗口（rune 数）