  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  level: "all"
  stdout: true

ds_think_chat_model:
  api_key: "e0891aaf-3305-44ed-9b5b-56f800e171d3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
