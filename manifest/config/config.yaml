doubao_embedding_model:
  api_key: "sk-ccb4e6c8f65f478b9ac539f5361446ce"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "text-embedding-v4"

file_dir: "d:/GoProject/Fo-Sentinel-Agent/docs"

# 语义缓存配置：用于 RAG 检索的 Redis 语义缓存，避免相似问题重复调用 Embedding API 和 Milvus
semantic_cache: 
  redis_addr:     "127.0.0.1:6379"
  redis_password: ""
  redis_db:       0
  key_prefix:     "rag:cache"        # 缓存 Key 前缀，隔离不同业务数据
  ttl_hours:      168                # 缓存有效时长（小时），到期自动失效，168h = 7天
  threshold:      0.80               # 余弦相似度命中阈值，≥ 该值视为语义等价
